```html
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tuệ Lương Khiêm - Không Gian Tịnh Tâm</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Phông chữ trang nghiêm -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Mulish:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-deep: #0a0807; /* Đen cực trầm */
      --gold-primary: #d4af37;
      --gold-light: #f9ecc8;
      --gold-dark: #8c7322;
      --glass-bg: rgba(20, 18, 16, 0.65);
      --glass-border: rgba(212, 175, 55, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Mulish', sans-serif;
      background-color: var(--bg-deep);
      color: var(--gold-light);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      perspective: 1200px; /* Tạo chiều sâu 3D cho hiệu ứng chuyển trang */
    }

    /* Hiệu ứng Ambient Glow tĩnh lặng */
    .ambient-light {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 100vw; height: 100vh;
      background: radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.08) 0%, transparent 60%);
      z-index: 0;
      pointer-events: none;
    }

    /* Hạt bụi sáng (Light Particles) bay lơ lửng */
    .particles {
      position: absolute; width: 100%; height: 100%; z-index: 1; pointer-events: none;
    }
    .particle {
      position: absolute;
      background: var(--gold-light);
      border-radius: 50%;
      opacity: 0;
      animation: floatUp 15s infinite linear;
      box-shadow: 0 0 8px var(--gold-light);
    }
    .particle:nth-child(1) { left: 10%; width: 2px; height: 2px; animation-duration: 12s; animation-delay: 0s; }
    .particle:nth-child(2) { left: 30%; width: 3px; height: 3px; animation-duration: 18s; animation-delay: 4s; }
    .particle:nth-child(3) { left: 50%; width: 2px; height: 2px; animation-duration: 14s; animation-delay: 2s; }
    .particle:nth-child(4) { left: 70%; width: 4px; height: 4px; animation-duration: 20s; animation-delay: 8s; opacity: 0.5;}
    .particle:nth-child(5) { left: 90%; width: 2px; height: 2px; animation-duration: 16s; animation-delay: 6s; }

    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      20% { opacity: 0.4; }
      80% { opacity: 0.4; }
      100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }

    /* NAV BAR - Đỉnh cao tối giản, kính mờ */
    nav {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px 20px;
    }

    .site-title {
      font-family: 'Lora', serif;
      font-size: 1.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--gold-primary);
      text-transform: uppercase;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .site-title::before, .site-title::after {
      content: "";
      width: 40px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
    }

    .menu-glass {
      display: flex;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 60px;
      padding: 6px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .nav-btn {
      background: transparent;
      border: none;
      color: var(--gold-dark);
      font-family: 'Lora', serif;
      font-size: 1.05rem;
      padding: 10px 30px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
      position: relative;
      overflow: hidden;
    }

    .nav-btn:hover {
      color: var(--gold-light);
    }

    .nav-btn.active {
      color: #0a0807;
      background: linear-gradient(135deg, var(--gold-light), var(--gold-primary));
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
      font-weight: 600;
    }

    /* VÙNG CHỨA NỘI DUNG IFRAME */
    main {
      flex: 1;
      position: relative;
      z-index: 5;
      padding: 0 20px 20px;
      display: flex;
      justify-content: center;
      perspective: 1500px; /* Cần thiết cho hiệu ứng 3D */
    }

    .content-wrapper {
      width: 100%;
      max-width: 1200px;
      position: relative;
      border-radius: 24px;
      /* Xóa viền cứng, thay bằng shadow phát sáng mềm mại */
      box-shadow: 0 25px 60px rgba(0,0,0,0.9), 0 0 40px rgba(212,175,55,0.03);
      transform-style: preserve-3d;
    }

    /* HIỆU ỨNG CHUYỂN CẢNH VIP PRO (ZEN 3D REVEAL) */
    iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      border-radius: 24px;
      background: #110f0d;
      
      /* Trạng thái mặc định: Ẩn, chìm xuống dưới và xoay nhẹ */
      opacity: 0;
      transform: translateY(40px) scale(0.95) rotateX(-5deg);
      pointer-events: none;
      transition: opacity 0.7s ease, transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
      z-index: 1;
    }

    /* Trạng thái đang hiển thị */
    iframe.active {
      opacity: 1;
      transform: translateY(0) scale(1) rotateX(0deg);
      pointer-events: auto;
      z-index: 3;
      box-shadow: inset 0 0 0 1px var(--glass-border);
    }

    /* Trạng thái vừa bị tắt (trôi ngược lên và mờ đi) */
    iframe.exiting {
      opacity: 0;
      transform: translateY(-40px) scale(0.98) rotateX(5deg);
      z-index: 2;
    }

    @media (max-width: 640px) {
      .site-title { font-size: 1.4rem; }
      .nav-btn { padding: 8px 20px; font-size: 0.95rem; }
      main { padding: 0 10px 10px; }
      .content-wrapper { border-radius: 16px; }
      iframe { border-radius: 16px; }
    }
  </style>
</head>
<body>
  <div class="ambient-light"></div>
  
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <nav>
    <div class="site-title">Tuệ Lương Khiêm</div>
    <div class="menu-glass">
      <button class="nav-btn active" data-target="personal">Trang Tu Học</button>
      <button class="nav-btn" data-target="sutra">Kinh &amp; Sách</button>
    </div>
  </nav>

  <main>
    <div class="content-wrapper">
      <iframe id="frame-personal" class="active" src="1.html" title="Trang Tu Học"></iframe>
      <!-- Đảm bảo file kinhhay.html có tông nền tối tương tự để không bị chói -->
      <iframe id="frame-sutra" src="kinhhay.html" title="Kinh Sách"></iframe>
    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const buttons = document.querySelectorAll('.nav-btn');
      const frames = {
        'personal': document.getElementById('frame-personal'),
        'sutra': document.getElementById('frame-sutra')
      };

      buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          // Bỏ qua nếu bấm lại tab đang chọn
          if (btn.classList.contains('active')) return;

          const targetId = btn.dataset.target;
          
          // Đổi màu nút
          buttons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');

          // Logic chuyển cảnh 3D
          Object.keys(frames).forEach(key => {
            const frame = frames[key];
            if (key === targetId) {
              // Frame mới tiến vào
              frame.classList.remove('exiting');
              frame.classList.add('active');
            } else if (frame.classList.contains('active')) {
              // Frame cũ lùi ra
              frame.classList.remove('active');
              frame.classList.add('exiting');
              
              // Dọn dẹp class exiting sau khi animation kết thúc (khoảng 800ms)
              setTimeout(() => {
                frame.classList.remove('exiting');
              }, 800);
            }
          });
        });
      });
    });
  </script>
</body>
</html>
